<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mini E-Commerce</title>
  <link rel="icon" type="image/png" href="minimart.png">
  <link rel="stylesheet" href="style.css">

<div id="filters">

  <script src="script.js"></script>
</body>
</html>
